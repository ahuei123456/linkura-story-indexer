repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check . --fix
        language: system
        always_run: true
        pass_filenames: false
      - id: pyrefly-check
        name: pyrefly check
        entry: uv run pyrefly check .
        language: system
        always_run: true
        pass_filenames: false
